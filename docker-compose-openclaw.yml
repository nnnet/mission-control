# OpenClaw Gateway — additive integration with Mission Control.
#
# This compose file is intentionally INDEPENDENT of `docker-compose.yml` and
# `docker-compose-dev.yml`. It does not modify the MC stack; it stands up the
# OpenClaw gateway daemon on the host's :18789 / :18790 ports, with a dedicated
# control-ui reverse proxy on :18791. MC already
# defaults to `OPENCLAW_GATEWAY_HOST=host.docker.internal` and
# `OPENCLAW_GATEWAY_PORT=18789`, so when this stack is up MC discovers the
# gateway with no config change. When this stack is down, MC silently falls
# back to its direct-API/CLI dispatch path (see src/lib/task-dispatch.ts).
#
# Architecture (live-updateable, bind-mounted):
#   - Both `openclaw-gateway` and the MC dev container bind-mount
#     `./openclaw-src/` from the host. The container runs from there:
#     `node /app/dist/index.js gateway`.
#   - To update openclaw: `make openclaw-update` runs `git pull` in
#     openclaw-src/ and re-runs `pnpm install + pnpm build` via the
#     `openclaw-builder` one-shot service. After build, restart the
#     gateway with `make openclaw-restart` — no docker image rebuild.
#
# Bring up:    make openclaw-up
# Tear down:   make openclaw-down       # MC keeps running on direct API
# Update:      make openclaw-update     # git pull + rebuild dist + restart
# Onboard:     make openclaw-onboard    # interactive provider/skills wizard

services:
  # Builder — one-shot: installs deps and compiles dist into ./openclaw-src/
  # on the host. Run via `make openclaw-build` (or directly:
  # `docker compose -f docker-compose-openclaw.yml --profile build run --rm
  # openclaw-builder`). The output (./openclaw-src/dist + ./openclaw-src/
  # node_modules) is what `openclaw-gateway` and MC's CLI wrapper consume.
  openclaw-builder:
    image: node:24-bookworm
    profiles: ["build"]
    container_name: mc-openclaw-builder
    working_dir: /app
    environment:
      NODE_OPTIONS: "--max-old-space-size=2048"
      CI: "1"
    volumes:
      - ./openclaw-src:/app:rw
      - openclaw-pnpm-store:/root/.local/share/pnpm/store
      - openclaw-bun-cache:/root/.bun
    entrypoint: ["bash", "-lc"]
    command:
      - |
        set -e
        corepack enable
        if [ ! -x /root/.bun/bin/bun ]; then
          curl -fsSL https://bun.sh/install | bash
        fi
        export PATH=/root/.bun/bin:$PATH
        echo "==> pnpm install (frozen lockfile)"
        pnpm install --frozen-lockfile
        echo "==> pnpm build"
        pnpm build
        echo "==> pnpm ui:build"
        pnpm ui:build
        echo "==> done — dist + node_modules populated under ./openclaw-src/"

  openclaw-gateway:
    image: node:24-bookworm
    container_name: mc-openclaw-gateway
    init: true
    restart: unless-stopped
    working_dir: /app
    # Run as the host user (uid 1000) so files written into bind-mounted
    # ./.openclaw-data and ./openclaw-src are readable/writable on the host
    # without sudo. The stock node:24-bookworm image's `node` user is uid 1000.
    user: "1000:1000"

    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-UTC}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_NUMERIC_USER_ID: ${TELEGRAM_NUMERIC_USER_ID:-}
      TELEGRAM_DM_POLICY: ${TELEGRAM_DM_POLICY:-}
      TELEGRAM_ALLOW_FROM: ${TELEGRAM_ALLOW_FROM:-}
      TELEGRAM_OWNER_ALLOW_FROM: ${TELEGRAM_OWNER_ALLOW_FROM:-}
      OPENCLAW_TOOLS_PROFILE: ${OPENCLAW_TOOLS_PROFILE:-coding}
      OPENCLAW_SECURITY_WORKSPACE_ONLY: ${OPENCLAW_SECURITY_WORKSPACE_ONLY:-1}
      OPENCLAW_SECURITY_DENY_AUTOMATION: ${OPENCLAW_SECURITY_DENY_AUTOMATION:-1}
      OPENCLAW_SECURITY_DENY_RUNTIME: ${OPENCLAW_SECURITY_DENY_RUNTIME:-1}
      OPENCLAW_SECURITY_DENY_FS: ${OPENCLAW_SECURITY_DENY_FS:-0}
      OPENCLAW_SECURITY_SANDBOX_ALL: ${OPENCLAW_SECURITY_SANDBOX_ALL:-1}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-1}
      # Plugin runtime stage dir lives under bind-mounted state so it inherits
      # uid 1000 ownership and survives container recreate. Avoid the default
      # /var/lib/openclaw/* path because Docker named volumes are root-owned
      # and our container runs as uid 1000.
      OPENCLAW_PLUGIN_STAGE_DIR: /home/node/.openclaw/plugin-runtime-deps
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}

    env_file:
      - path: .env
        required: false
      - path: .env.openclaw
        required: false

    volumes:
      # Application code — bind-mounted from the host clone. Update via
      # `make openclaw-update`; restart container to pick up new dist.
      - ./openclaw-src:/app:rw
      # Persistent gateway state (openclaw.json, sessions DB, workspace,
      # plugin-runtime-deps stage). All under one bind-mount so ownership
      # is consistent.
      - ./.openclaw-data:/home/node/.openclaw

    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:${OPENCLAW_GATEWAY_INTERNAL_PORT:-18789}"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:${OPENCLAW_BRIDGE_INTERNAL_PORT:-18790}"

    entrypoint: ["bash", "-lc"]
    command:
      - >
        mkdir -p /home/node/.openclaw/credentials &&
        node -e "
          const fs=require('node:fs');
          const path=require('node:path');
          const configPath=process.env.OPENCLAW_CONFIG_PATH||'/home/node/.openclaw/openclaw.json';
          fs.mkdirSync(path.dirname(configPath), { recursive: true });
          let config={};
          if (fs.existsSync(configPath)) {
            try {
              const parsed=JSON.parse(fs.readFileSync(configPath, 'utf8'));
              if (parsed && typeof parsed==='object' && !Array.isArray(parsed)) config=parsed;
            } catch (error) {
              throw new Error('Invalid OpenClaw config JSON at '+configPath+': '+error.message);
            }
          }
          const gateway=(config.gateway && typeof config.gateway==='object' && !Array.isArray(config.gateway)) ? config.gateway : {};
          const controlUi=(gateway.controlUi && typeof gateway.controlUi==='object' && !Array.isArray(gateway.controlUi)) ? gateway.controlUi : {};
          const hasEnv=(name)=>Object.prototype.hasOwnProperty.call(process.env, name);
          const trimEnv=(name)=>hasEnv(name) ? String(process.env[name]||'').trim() : '';
          const parseOptionalBoolEnv=(name)=>{
            if (!hasEnv(name)) return null;
            const normalized=trimEnv(name).toLowerCase();
            if (!normalized) return null;
            if (['1','true','yes','on'].includes(normalized)) return true;
            if (['0','false','no','off'].includes(normalized)) return false;
            return null;
          };
          const gatewayToken=trimEnv('OPENCLAW_GATEWAY_TOKEN');
          const toolsProfile=trimEnv('OPENCLAW_TOOLS_PROFILE');
          const workspaceOnlyToggle=parseOptionalBoolEnv('OPENCLAW_SECURITY_WORKSPACE_ONLY');
          const denyAutomation=parseOptionalBoolEnv('OPENCLAW_SECURITY_DENY_AUTOMATION');
          const denyRuntime=parseOptionalBoolEnv('OPENCLAW_SECURITY_DENY_RUNTIME');
          const denyFs=parseOptionalBoolEnv('OPENCLAW_SECURITY_DENY_FS');
          const sandboxModeAll=parseOptionalBoolEnv('OPENCLAW_SECURITY_SANDBOX_ALL');
          const managedDenyGroups=new Set(['group:automation','group:runtime','group:fs']);
          const telegramBotToken=trimEnv('TELEGRAM_BOT_TOKEN');
          const telegramOwnerIdRaw=trimEnv('TELEGRAM_NUMERIC_USER_ID');
          const telegramDmPolicyRaw=trimEnv('TELEGRAM_DM_POLICY').toLowerCase();
          const telegramAllowFromRaw=trimEnv('TELEGRAM_ALLOW_FROM');
          const telegramOwnerAllowFromRaw=trimEnv('TELEGRAM_OWNER_ALLOW_FROM');
          const commands=(config.commands && typeof config.commands==='object' && !Array.isArray(config.commands)) ? config.commands : {};
          const parseCsv=(raw)=>raw.split(',').map((entry)=>String(entry||'').trim()).filter(Boolean);
          const parseNumericIds=(raw)=>{
            const seen=new Set();
            const out=[];
            for (const entry of parseCsv(raw)) {
              if (!/^[1-9][0-9]*$/.test(entry)) continue;
              if (seen.has(entry)) continue;
              seen.add(entry);
              out.push(entry);
            }
            return out;
          };
          const normalizeOwnerIdentity=(entry)=>{
            const value=String(entry||'').trim();
            if (!value) return null;
            if (/^[1-9][0-9]*$/.test(value)) return 'telegram:'+value;
            const prefixed=value.match(/^telegram:([1-9][0-9]*)$/);
            if (!prefixed) return null;
            return 'telegram:'+prefixed[1];
          };
          const parseOwnerAllowFrom=(raw)=>{
            const seen=new Set();
            const out=[];
            for (const entry of parseCsv(raw)) {
              const normalized=normalizeOwnerIdentity(entry);
              if (!normalized || seen.has(normalized)) continue;
              seen.add(normalized);
              out.push(normalized);
            }
            return out;
          };
          const mergeUnique=(existing, additions)=>{
            const seen=new Set();
            const out=[];
            if (Array.isArray(existing)) {
              for (const entry of existing) {
                const normalized=String(entry||'').trim();
                if (!normalized || seen.has(normalized)) continue;
                seen.add(normalized);
                out.push(normalized);
              }
            }
            for (const entry of additions) {
              const normalized=String(entry||'').trim();
              if (!normalized || seen.has(normalized)) continue;
              seen.add(normalized);
              out.push(normalized);
            }
            return out;
          };
          const validTelegramDmPolicies=new Set(['allowlist','pairing','open']);
          const telegramLegacyOwnerIds=parseNumericIds(telegramOwnerIdRaw);
          let telegramAllowFrom=parseNumericIds(telegramAllowFromRaw);
          let telegramOwnerAllowFrom=parseOwnerAllowFrom(telegramOwnerAllowFromRaw);
          if (telegramLegacyOwnerIds.length>0) {
            telegramAllowFrom=mergeUnique(telegramAllowFrom, telegramLegacyOwnerIds);
            telegramOwnerAllowFrom=mergeUnique(telegramOwnerAllowFrom, telegramLegacyOwnerIds.map((id)=>'telegram:'+id));
          }
          const telegramDmPolicy=validTelegramDmPolicies.has(telegramDmPolicyRaw)
            ? telegramDmPolicyRaw
            : (telegramLegacyOwnerIds.length>0 ? 'allowlist' : 'pairing');
          const shouldBootstrapTelegram = telegramBotToken.length>0 || telegramAllowFrom.length>0 || telegramOwnerAllowFrom.length>0 || telegramLegacyOwnerIds.length>0 || telegramDmPolicyRaw.length>0;
          const gatewayPort=trimEnv('OPENCLAW_GATEWAY_INTERNAL_PORT') || '18789';
          const controlUiPort=trimEnv('OPENCLAW_CONTROL_UI_PORT') || '18791';
          const normalizedOrigins=Array.isArray(controlUi.allowedOrigins)
            ? controlUi.allowedOrigins.filter((origin)=>typeof origin==='string' && origin.trim().length>0)
            : [];
          const requiredOrigins=[
            'http://localhost:'+gatewayPort,
            'http://127.0.0.1:'+gatewayPort,
            'http://localhost:'+controlUiPort,
            'http://127.0.0.1:'+controlUiPort,
          ];
          for (const origin of requiredOrigins) {
            if (!normalizedOrigins.includes(origin)) normalizedOrigins.push(origin);
          }
          controlUi.allowedOrigins=normalizedOrigins;
          gateway.controlUi=controlUi;
          gateway.mode='local';
          if (gatewayToken.length>0) {
            gateway.auth={
              mode:'token',
              token:{
                source:'env',
                provider:'default',
                id:'OPENCLAW_GATEWAY_TOKEN',
              },
            };
          }
          config.gateway=gateway;

          if (shouldBootstrapTelegram) {
            const channels=(config.channels && typeof config.channels==='object' && !Array.isArray(config.channels)) ? config.channels : {};
            const telegram=(channels.telegram && typeof channels.telegram==='object' && !Array.isArray(channels.telegram)) ? channels.telegram : {};
            telegram.enabled=true;
            if (telegramBotToken.length>0) {
              telegram.botToken={
                source:'env',
                provider:'default',
                id:'TELEGRAM_BOT_TOKEN',
              };
            }
            if (telegramOwnerAllowFrom.length>0) {
              commands.ownerAllowFrom=mergeUnique(commands.ownerAllowFrom, telegramOwnerAllowFrom);
            }
            if (telegramAllowFrom.length>0) {
              telegram.allowFrom=mergeUnique(telegram.allowFrom, telegramAllowFrom);
            }
            telegram.dmPolicy=telegramDmPolicy;
            channels.telegram=telegram;
            config.channels=channels;
          }

          config.commands=commands;

          const tools=(config.tools && typeof config.tools==='object' && !Array.isArray(config.tools)) ? config.tools : {};
          if (toolsProfile) {
            tools.profile=toolsProfile;
          }
          const fsTools=(tools.fs && typeof tools.fs==='object' && !Array.isArray(tools.fs)) ? tools.fs : {};
          if (workspaceOnlyToggle !== null) {
            fsTools.workspaceOnly=workspaceOnlyToggle;
          }
          if (Object.keys(fsTools).length>0) {
            tools.fs=fsTools;
          }

          const shouldManageDeny=[denyAutomation, denyRuntime, denyFs].some((value)=>value!==null);
          if (shouldManageDeny) {
            const desiredDenyGroups=[];
            if (denyAutomation) desiredDenyGroups.push('group:automation');
            if (denyRuntime) desiredDenyGroups.push('group:runtime');
            if (denyFs) desiredDenyGroups.push('group:fs');
            const existingDeny=Array.isArray(tools.deny) ? tools.deny : [];
            const normalizedDeny=[];
            for (const entry of existingDeny) {
              const normalized=String(entry||'').trim();
              if (!normalized || managedDenyGroups.has(normalized) || normalizedDeny.includes(normalized)) continue;
              normalizedDeny.push(normalized);
            }
            for (const entry of desiredDenyGroups) {
              if (!normalizedDeny.includes(entry)) normalizedDeny.push(entry);
            }
            tools.deny=normalizedDeny;
          }
          config.tools=tools;

          if (sandboxModeAll !== null) {
            const agents=(config.agents && typeof config.agents==='object' && !Array.isArray(config.agents)) ? config.agents : {};
            const defaults=(agents.defaults && typeof agents.defaults==='object' && !Array.isArray(agents.defaults)) ? agents.defaults : {};
            const sandbox=(defaults.sandbox && typeof defaults.sandbox==='object' && !Array.isArray(defaults.sandbox)) ? defaults.sandbox : {};
            if (sandboxModeAll) {
              sandbox.mode='all';
            } else if ('mode' in sandbox) {
              delete sandbox.mode;
            }
            if (Object.keys(sandbox).length>0) {
              defaults.sandbox=sandbox;
            } else if ('sandbox' in defaults) {
              delete defaults.sandbox;
            }
            if (Object.keys(defaults).length>0) {
              agents.defaults=defaults;
            } else if ('defaults' in agents) {
              delete agents.defaults;
            }
            if (Object.keys(agents).length>0) {
              config.agents=agents;
            }
          }

          fs.writeFileSync(configPath, JSON.stringify(config, null, 2)+'\n');
        " &&
        exec node dist/index.js gateway --bind "${OPENCLAW_GATEWAY_BIND:-lan}" --port "${OPENCLAW_GATEWAY_INTERNAL_PORT:-18789}"

    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:'+String(process.env.OPENCLAW_GATEWAY_INTERNAL_PORT||'18789')+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # CLI sidecar — interactive ops (`openclaw onboard`, `openclaw doctor`).
  # Shares the gateway's network namespace and bind-mounts the same
  # openclaw-src tree, so it always runs the same code as the gateway.
  openclaw-cli:
    image: node:24-bookworm
    container_name: mc-openclaw-cli
    network_mode: "service:openclaw-gateway"
    init: true
    stdin_open: true
    tty: true
    working_dir: /app
    user: "1000:1000"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true

    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-UTC}
      BROWSER: echo
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_NUMERIC_USER_ID: ${TELEGRAM_NUMERIC_USER_ID:-}
      TELEGRAM_DM_POLICY: ${TELEGRAM_DM_POLICY:-}
      TELEGRAM_ALLOW_FROM: ${TELEGRAM_ALLOW_FROM:-}
      TELEGRAM_OWNER_ALLOW_FROM: ${TELEGRAM_OWNER_ALLOW_FROM:-}
      OPENCLAW_TOOLS_PROFILE: ${OPENCLAW_TOOLS_PROFILE:-coding}
      OPENCLAW_SECURITY_WORKSPACE_ONLY: ${OPENCLAW_SECURITY_WORKSPACE_ONLY:-1}
      OPENCLAW_SECURITY_DENY_AUTOMATION: ${OPENCLAW_SECURITY_DENY_AUTOMATION:-1}
      OPENCLAW_SECURITY_DENY_RUNTIME: ${OPENCLAW_SECURITY_DENY_RUNTIME:-1}
      OPENCLAW_SECURITY_DENY_FS: ${OPENCLAW_SECURITY_DENY_FS:-0}
      OPENCLAW_SECURITY_SANDBOX_ALL: ${OPENCLAW_SECURITY_SANDBOX_ALL:-1}
      OPENCLAW_PLUGIN_STAGE_DIR: /home/node/.openclaw/plugin-runtime-deps
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

    env_file:
      - path: .env
        required: false
      - path: .env.openclaw
        required: false

    volumes:
      - ./openclaw-src:/app:rw
      - ./.openclaw-data:/home/node/.openclaw

    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway

  openclaw-control-ui:
    image: nginx:1.27-alpine
    container_name: mc-openclaw-control-ui
    restart: unless-stopped
    depends_on:
      - openclaw-gateway
    ports:
      - "${OPENCLAW_CONTROL_UI_PORT:-18791}:80"
    volumes:
      - ./openclaw-src/dist/control-ui:/usr/share/nginx/html:ro
      - ./docker/openclaw-control-ui.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -q -O /dev/null http://127.0.0.1/ || exit 1"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  openclaw-control-ui-autopair:
    image: node:24-bookworm
    container_name: mc-openclaw-control-ui-autopair
    restart: unless-stopped
    init: true
    user: "1000:1000"
    depends_on:
      - openclaw-gateway
    working_dir: /app
    environment:
      OPENCLAW_LOCAL_DEV_AUTO_APPROVE: "1"
      OPENCLAW_CONTROL_UI_AUTO_APPROVE_INTERVAL_MS: ${OPENCLAW_CONTROL_UI_AUTO_APPROVE_INTERVAL_MS:-1000}
    volumes:
      - ./scripts:/app/scripts:ro
      - ./.openclaw-data:/app/.openclaw-data:rw
    entrypoint: ["node", "scripts/openclaw-auto-approve-control-ui.mjs", "--watch"]

volumes:
  openclaw-pnpm-store:
  openclaw-bun-cache:
